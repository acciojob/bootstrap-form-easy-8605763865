<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	
</head>

<body id="container">
	<h1 id="header"> Internship form</h1>
	<form border="2px solid black">
		<label  class="form-label" for="first-name-input"> First Name </label>
			<input class="form-control" id="first-name-input" type="text" required="yes">
		<div class="invalid-feedback">First name required!</div>
	<label class="form-label"  for="last-name-input"> Last Name 
		<input class="form-control" id="last-name-input" type="text" required="yes"></label>
		<div class="invalid-feedback"> Last name required!</div>
		<label class="form-label" for="email-input"> Email Address  <input id="email-input" class="form-control" type="email" required="yes"></label>
		<div class="invalid-feedback"> Email required!</div>
		<label class="form-label" for="college-input"> College <input id="college-input" type="text" class="form-control" required="yes" > </label>
		<div class="invalid-feedback"> Please provide a valid college</div>
		<label class="form-label"   for="grad-year-select"> Graduation Year</label>
		<select  id="grad-year-select form-select" required="yes"> 
		
			<option value="">choose...</option>
			<option> 2020</option>
			<option> 2021</option>
			<option> 2022</option>
			<option> 2023</option>
		</select>
		
		</label>
		<div class="invalid-feedback"> Please select a valid Graduation Year</div>
		<label class="form-label" for="roll-no-input"> Roll No.\
			<input type="text"  class="form-control" id="roll-no-input"  required="yes"></label> <br>
		<div class="invalid-feedback"> Please provide a valid Roll no.</div>
		<label for="conditions-checkbox"></label>
		<input type="checkbox" required class="form-check-input" id="conditions-checkbox">Agree to terms and conditions 
<div class="invalid-feedback">You must agree before submitting </div> <br>
		<button type="submit"> Submit Form</button>
	</form>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
